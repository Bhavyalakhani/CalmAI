# Cloud Build CI/CD — builds and pushes the CalmAI Airflow Docker image
# to Google Artifact Registry for deployment on GCE or Cloud Run.
#
# Usage (manual):
#   gcloud builds submit --config cloudbuild.yaml \
#     --substitutions=_REGION=us-central1,_REPO=calmai-docker .
#
# When triggered by a git push, _TAG defaults to the short commit SHA.
# When run manually, _TAG defaults to "manual".

steps:
  # build the airflow docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/calmai-airflow:${_TAG}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/calmai-airflow:latest'
      - '.'

  # push both tags
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/calmai-airflow:${_TAG}'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/calmai-airflow:latest'

images:
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/calmai-airflow:${_TAG}'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/calmai-airflow:latest'

substitutions:
  _REGION: us-central1
  _REPO: calmai-docker
  _TAG: manual

options:
  logging: CLOUD_LOGGING_ONLY
